# pytest.ini
[pytest]
testpaths = tests
test_files = test_*.py
filterwarnings =
    ignore::DeprecationWarning
    ignore::RuntimeWarning
addopts = 
    -v
    --tb=short
    --strict-markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests